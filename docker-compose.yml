services:
  datagraphx:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datagraphx-app
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      llamacpp-llm:
        condition: service_started
      llamacpp-embedding:
        condition: service_started
    ports:
      - "${DATAGRAPHX_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3001
      NEO4J_URL: neo4j://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-dev_password_change_me}
      LLM_BASE_URL: http://llamacpp-llm:8080/v1
      LLM_MODEL: ${LLM_MODEL_NAME:-qwen3-14b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LM_STUDIO_BASE_URL: http://llamacpp-embedding:8080/v1
      LM_STUDIO_EMBED_MODEL: ${EMBED_MODEL_NAME:-text-embedding-nomic-embed-text-v1.5}
    volumes:
      - ./nodejs-app/data:/app/nodejs-app/data

  neo4j:
    image: neo4j:5-community
    container_name: datagraphx-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-dev_password_change_me}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-dev_password_change_me}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL:-512m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-2G}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-1G}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD:-dev_password_change_me}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  llamacpp-llm:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: datagraphx-llamacpp-llm
    restart: unless-stopped
    ports:
      - "${LLAMACPP_LLM_PORT:-1234}:8080"
    volumes:
      - ./models:/models:ro
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/${LLAMACPP_LLM_MODEL:-Qwen3-14B-Q4_K_M.gguf}
      - --alias
      - ${LLM_MODEL_NAME:-qwen3-14b}
      - --ctx-size
      - "${LLAMACPP_CTX_SIZE:-8192}"
      - --n-gpu-layers
      - "${LLAMACPP_GPU_LAYERS:-999}"

  llamacpp-embedding:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: datagraphx-llamacpp-embedding
    restart: unless-stopped
    ports:
      - "${LLAMACPP_EMBED_PORT:-1235}:8080"
    volumes:
      - ./models:/models:ro
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --model
      - /models/${LLAMACPP_EMBED_MODEL:-nomic-embed-text-v1.5.Q4_K_M.gguf}
      - --alias
      - ${EMBED_MODEL_NAME:-text-embedding-nomic-embed-text-v1.5}
      - --embedding
      - --ctx-size
      - "${LLAMACPP_EMBED_CTX_SIZE:-2048}"
      - --n-gpu-layers
      - "${LLAMACPP_GPU_LAYERS:-999}"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
